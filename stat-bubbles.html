<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat Bubbles</title>
    <style>
        body { font-family: Arial, sans-serif; } 
        .bubble { border-radius: 50%; border: 2px solid #4CAF50; position: relative; display: inline-block; 
        margin: 10px; padding: 20px; color: white; text-align: center; }
    </style>
</head>
<body>
    <h1>Statistics</h1>
    <div class="bubble" style="background-color: #4CAF50;">Bubble 1: Data Point 1</div>
    <div class="bubble" style="background-color: #2196F3;">Bubble 2: Data Point 2</div>
    <div class="bubble" style="background-color: #FF9800;">Bubble 3: Data Point 3</div>
    <div class="bubble" style="background-color: #f44336;">Bubble 4: Data Point 4</div>
</body>
</html>
